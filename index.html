  <!-- No-flash theme bootstrap. Runs synchronously before paint, AFTER all
       async/defer JSON-LD + GA4 scripts so it does not delay them.  Preserves
       the user's stored theme (light / dark / system) to avoid a flash of
       the wrong theme on first paint. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('fv_theme');
        var theme = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = theme === 'dark' || (theme === 'system' && prefersDark);
        if (isDark) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      } catch (e) {
        /* localStorage unavailable — leave light */
      }
    })();
  </script>
