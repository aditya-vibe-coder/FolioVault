<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="equityBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="debtBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="30" x2="1200" y2="30" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="1200" y2="90" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="330" x2="1200" y2="330" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="390" x2="1200" y2="390" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="510" x2="1200" y2="510" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="570" x2="1200" y2="570" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Left content area -->
  <g transform="translate(60, 0)">

    <!-- Brand -->
    <text x="0" y="80" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748B" letter-spacing="3">FOLIOVAULT</text>
    <rect x="0" y="92" width="40" height="3" rx="1.5" fill="url(#accent)"/>

    <!-- Tagline -->
    <text x="0" y="145" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#F8FAFC">Privacy-First Portfolio</text>
    <text x="0" y="190" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#F8FAFC">Tracker for India</text>
    <text x="0" y="225" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" fill="#94A3B8">Mutual Funds · Stocks · PPF · NPS · FDs · SGBs · Gold</text>

    <!-- Feature pills -->
    <g transform="translate(0, 270)">
      <rect x="0" y="0" width="105" height="32" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="16" y="22" font-family="Inter, Arial, sans-serif" font-size="13" fill="#10B981" font-weight="600">📊 XIRR Engine</text>

      <rect x="118" y="0" width="105" height="32" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="134" y="22" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0EA5E9" font-weight="600">🛡️ Local-Only</text>

      <rect x="236" y="0" width="100" height="32" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="252" y="22" font-family="Inter, Arial, sans-serif" font-size="13" fill="#A78BFA" font-weight="600">🤖 AI Coach</text>

      <rect x="349" y="0" width="110" height="32" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="365" y="22" font-family="Inter, Arial, sans-serif" font-size="13" fill="#F59E0B" font-weight="600">📄 ITR Report</text>
    </g>

    <!-- Stats row -->
    <g transform="translate(0, 335)">
      <rect x="0" y="0" width="145" height="65" rx="10" fill="rgba(30, 41, 59, 0.7)" stroke="#334155" stroke-width="1"/>
      <text x="16" y="26" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#F8FAFC">₹24.7L</text>
      <text x="16" y="46" font-family="Inter, Arial, sans-serif" font-size="11" fill="#64748B">Current Portfolio Value</text>

      <rect x="158" y="0" width="145" height="65" rx="10" fill="rgba(30, 41, 59, 0.7)" stroke="#334155" stroke-width="1"/>
      <text x="174" y="26" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#10B981">+16.8%</text>
      <text x="174" y="46" font-family="Inter, Arial, sans-serif" font-size="11" fill="#64748B">XIRR (Annualised)</text>

      <rect x="316" y="0" width="145" height="65" rx="10" fill="rgba(30, 41, 59, 0.7)" stroke="#334155" stroke-width="1"/>
      <text x="332" y="26" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0EA5E9">₹8.2K</text>
      <text x="332" y="46" font-family="Inter, Arial, sans-serif" font-size="11" fill="#64748B">Day Change</text>
    </g>

    <!-- Asset allocation bars -->
    <g transform="translate(0, 430)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#CBD5E1">Asset Allocation</text>

      <g transform="translate(0, 20)">
        <text x="0" y="12" font-family="Inter, Arial, sans-serif" font-size="11" fill="#64748B">Equity</text>
        <rect x="60" y="2" width="200" height="12" rx="6" fill="#1E293B"/>
        <rect x="60" y="2" width="130" height="12" rx="6" fill="url(#equityBar)"/>
        <text x="268" y="12" font-family="Inter, Arial, sans-serif" font-size="11" fill="#34D399" font-weight="600">65%</text>
      </g>

      <g transform="translate(0, 42)">
        <text x="0" y="12" font-family="Inter, Arial, sans-serif" font-size="11" fill="#64748B">Debt</text>
        <rect x="60" y="2" width="200" height="12" rx="6" fill="#1E293B"/>
        <rect x="60" y="2" width="50" height="12" rx="6" fill="url(#debtBar)"/>
        <text x="268" y="12" font-family="Inter, Arial, sans-serif" font-size="11" fill="#38BDF8" font-weight="600">25%</text>
      </g>

      <g transform="translate(0, 64)">
        <text x="0" y="12" font-family="Inter, Arial, sans-serif" font-size="11" fill="#64748B">Gold</text>
        <rect x="60" y="2" width="200" height="12" rx="6" fill="#1E293B"/>
        <rect x="60" y="2" width="20" height="12" rx="6" fill="url(#goldBar)"/>
        <text x="268" y="12" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FBBF24" font-weight="600">10%</text>
      </g>
    </g>
  </g>

  <!-- Right side: Dashboard preview -->
  <g transform="translate(620, 60)" filter="url(#shadow)">
    <!-- Card body -->
    <rect x="0" y="0" width="500" height="510" rx="16" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="0" width="500" height="510" rx="16" fill="url(#cardGrad)" opacity="0.8"/>

    <!-- Holdings header -->
    <rect x="24" y="24" width="452" height="44" rx="10" fill="#1E3A5F"/>
    <text x="40" y="52" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#F8FAFC">📈 Top Holdings</text>

    <!-- Holding rows -->
    <!-- Axis Bluechip -->
    <g transform="translate(24, 90)">
      <circle cx="8" cy="8" r="6" fill="#10B981"/>
      <text x="22" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#CBD5E1" font-weight="600">Axis Bluechip Fund</text>
      <text x="320" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#F8FAFC" font-weight="700" text-anchor="end">₹4,82,300</text>
      <text x="420" y="13" font-family="Inter, Arial, sans-serif" font-size="12" fill="#10B981" text-anchor="end">+18.2%</text>
      <line x1="0" y1="28" x2="452" y2="28" stroke="#1E293B" stroke-width="1"/>
    </g>

    <!-- HDFC Bank -->
    <g transform="translate(24, 134)">
      <circle cx="8" cy="8" r="6" fill="#0EA5E9"/>
      <text x="22" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#CBD5E1" font-weight="600">HDFC Bank</text>
      <text x="320" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#F8FAFC" font-weight="700" text-anchor="end">₹3,12,450</text>
      <text x="420" y="13" font-family="Inter, Arial, sans-serif" font-size="12" fill="#10B981" text-anchor="end">+12.7%</text>
      <line x1="0" y1="28" x2="452" y2="28" stroke="#1E293B" stroke-width="1"/>
    </g>

    <!-- PPF -->
    <g transform="translate(24, 178)">
      <circle cx="8" cy="8" r="6" fill="#A855F7"/>
      <text x="22" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#CBD5E1" font-weight="600">PPF Account</text>
      <text x="320" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#F8FAFC" font-weight="700" text-anchor="end">₹2,50,000</text>
      <text x="420" y="13" font-family="Inter, Arial, sans-serif" font-size="12" fill="#F59E0B" text-anchor="end">+7.1%</text>
      <line x1="0" y1="28" x2="452" y2="28" stroke="#1E293B" stroke-width="1"/>
    </g>

    <!-- NPS -->
    <g transform="translate(24, 222)">
      <circle cx="8" cy="8" r="6" fill="#6366F1"/>
      <text x="22" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#CBD5E1" font-weight="600">NPS Tier I</text>
      <text x="320" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#F8FAFC" font-weight="700" text-anchor="end">₹1,80,000</text>
      <text x="420" y="13" font-family="Inter, Arial, sans-serif" font-size="12" fill="#F59E0B" text-anchor="end">+9.4%</text>
      <line x1="0" y1="28" x2="452" y2="28" stroke="#1E293B" stroke-width="1"/>
    </g>

    <!-- SGB -->
    <g transform="translate(24, 266)">
      <circle cx="8" cy="8" r="6" fill="#F59E0B"/>
      <text x="22" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#CBD5E1" font-weight="600">Sovereign Gold Bond 2031</text>
      <text x="320" y="13" font-family="Inter, Arial, sans-serif" font-size="13" fill="#F8FAFC" font-weight="700" text-anchor="end">₹1,20,000</text>
      <text x="420" y="13" font-family="Inter, Arial, sans-serif" font-size="12" fill="#10B981" text-anchor="end">+14.8%</text>
      <line x1="0" y1="28" x2="452" y2="28" stroke="#1E293B" stroke-width="1"/>
    </g>

    <!-- Quick action bar -->
    <g transform="translate(24, 315)">
      <rect x="0" y="0" width="452" height="50" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="20" y="30" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748B">📄 Import CAS PDF →</text>
      <text x="220" y="30" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748B">📊 Generate ITR Report →</text>
      <text x="380" y="30" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748B">🤖 Ask Coach →</text>
    </g>

    <!-- AI Coach preview -->
    <g transform="translate(24, 385)">
      <rect x="0" y="0" width="452" height="100" rx="10" fill="#1E1B2E" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="0" y="0" width="452" height="100" rx="10" fill="url(#cardGrad)" opacity="0.5"/>
      <text x="16" y="24" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A78BFA" font-weight="700">✨ AI Coach Insight</text>
      <text x="16" y="48" font-family="Inter, Arial, sans-serif" font-size="12" fill="#94A3B8">
        <tspan x="16" dy="0">Your regular mutual fund holdings are costing you</tspan>
        <tspan x="16" dy="20">≈₹12,000/yr in distributor commissions. Switching to</tspan>
        <tspan x="16" dy="20">Direct plans could save ₹1.2L over 10 years.</tspan>
      </text>
    </g>
  </g>

  <!-- Decorative elements -->
  <g opacity="0.05">
    <text x="50" y="580" font-family="Inter, Arial, sans-serif" font-size="80">₹</text>
    <text x="1100" y="100" font-family="Inter, Arial, sans-serif" font-size="60">📈</text>
    <text x="580" y="580" font-family="Inter, Arial, sans-serif" font-size="50">🛡️</text>
  </g>

  <!-- Bottom gradient line -->
  <rect x="60" y="565" width="1080" height="1" fill="url(#accent)" opacity="0.3"/>
</svg>
