<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="vault" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Vault body -->
  <rect x="12" y="16" width="40" height="36" rx="4" fill="url(#vault)"/>
  <!-- Vault door circle -->
  <circle cx="32" cy="34" r="11" fill="none" stroke="#0F172A" stroke-width="2.5"/>
  <!-- Vault spokes -->
  <g stroke="#0F172A" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="23" x2="32" y2="27"/>
    <line x1="32" y1="41" x2="32" y2="45"/>
    <line x1="21" y1="34" x2="25" y2="34"/>
    <line x1="39" y1="34" x2="43" y2="34"/>
  </g>
  <!-- Center dot -->
  <circle cx="32" cy="34" r="3" fill="#F59E0B"/>
  <!-- Top bar -->
  <rect x="12" y="16" width="40" height="6" rx="3" fill="#0F172A"/>
  <!-- Upward trend arrow indicating growth -->
  <path d="M18 14 L24 9 L30 12 L36 7 L42 10 L48 6" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
